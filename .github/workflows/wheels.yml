name: Build wheels and publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04         # Linux x86_64 (native)
          - os: ubuntu-24.04-arm     # Linux aarch64 (native — no QEMU)
          # No Intel macOS: macos-13 is GitHub's only x86_64 image, its runner
          # pool is scarce (jobs routinely never get scheduled) and it is being
          # retired. macOS ships arm64-only; Intel users build from the sdist.
          - os: macos-14
            macosx_deployment_target: "14.0"

    steps:
      - uses: actions/checkout@v4

      - uses: pypa/cibuildwheel@v3.4.1
        env:
          # Build only the runner's native arch. aarch64 builds natively on
          # ubuntu-24.04-arm instead of under QEMU emulation (~10-30x faster).
          # On macOS, openblas/sleef come from Homebrew as single-arch dylibs,
          # so cross-arch linking fails: macos-13 covers x86_64, macos-14 arm64.
          CIBW_ARCHS_LINUX: "native"
          CIBW_ARCHS_MACOS: "native"
          # Match the wheel floor to the bundled Homebrew dylibs' minimum OS
          # (= the runner's macOS version); otherwise delocate rejects the
          # wheel. Empty on Linux, where it is ignored.
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
