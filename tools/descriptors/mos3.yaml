model:
  ngspice_prefix: "MOS3"
  neospice_name: "mos3"
  neospice_namespace: "mos3"
  instance_struct: "MOS3instance"
  model_struct: "MOS3model"
  instance_tag: "sMOS3instance"
  model_tag: "sMOS3model"
  cpp_instance: "MOS3Instance"
  cpp_model: "MOS3Model"
  gen_instance: "GENinstance"
  gen_model: "GENmodel"
  terminals:
