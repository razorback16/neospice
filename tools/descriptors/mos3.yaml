  name_field: "MOS3name"
  matrix_ptr_suffix: "Ptr"
  source_files:
    setup: "mos3set.c"
    load: "mos3load.c"
    temp: "mos3temp.c"
    param: "mos3par.c"
    mpar: "mos3mpar.c"
