    - { name: "W", field: "MOS1w", given: "MOS1wGiven", default: "1e-6" }
    - { name: "L", field: "MOS1l", given: "MOS1lGiven", default: "1e-4" }
    - { name: "AD", field: "MOS1drainArea", given: "MOS1drainAreaGiven", default: "0.0" }
    - { name: "AS", field: "MOS1sourceArea", given: "MOS1sourceAreaGiven", default: "0.0" }
    - { name: "PD", field: "MOS1drainPerimiter", given: "MOS1drainPerimiterGiven", default: "0.0" }
    - { name: "PS", field: "MOS1sourcePerimiter", given: "MOS1sourcePerimiterGiven", default: "0.0" }
    - { name: "NRD", field: "MOS1drainSquares", given: "MOS1drainSquaresGiven", default: "0.0" }
    - { name: "NRS", field: "MOS1sourceSquares", given: "MOS1sourceSquaresGiven", default: "0.0" }
    - { name: "M", field: "MOS1m", given: "MOS1mGiven", default: "1.0" }
  model_types:
    - { spice_name: "nmos", flag_field: "MOS1type", flag_value: 1 }
    - { spice_name: "pmos", flag_field: "MOS1type", flag_value: -1 }
  charge_states: [5, 8, 11, 13, 15]  # qgs, qgd, qgb, qbd, qbs
