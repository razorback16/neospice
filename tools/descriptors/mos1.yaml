    - "mos1ic.c"
    - "mos1init.c"
    - "mos1mask.c"
    - "mos1mdel.c"
    - "mos1noi.c"
    - "mos1pzld.c"
    - "mos1sacl.c"
    - "mos1sld.c"
    - "mos1sprt.c"
    - "mos1sset.c"
    - "mos1supd.c"
    - "mos1trun.c"
  defines: []
  has_internal_nodes: true
  setup_function: "MOS1setup"
  temp_function: "MOS1temp"
  load_function: "MOS1load"
