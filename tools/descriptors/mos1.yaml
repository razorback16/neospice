model:
  ngspice_prefix: "MOS1"
  neospice_name: "mos1"
  neospice_namespace: "mos1"
  instance_struct: "MOS1instance"
  model_struct: "MOS1model"
  instance_tag: "sMOS1instance"
  model_tag: "sMOS1model"
  cpp_instance: "MOS1Instance"
  cpp_model: "MOS1Model"
  gen_instance: "GENinstance"
  gen_model: "GENmodel"
  terminals:
