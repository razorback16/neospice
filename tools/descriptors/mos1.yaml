  name_field: "MOS1name"
  matrix_ptr_suffix: "Ptr"
  source_files:
    setup: "mos1set.c"
    load: "mos1load.c"
    temp: "mos1temp.c"
    param: "mos1par.c"
    mpar: "mos1mpar.c"
    devsup: "mos1.c"
