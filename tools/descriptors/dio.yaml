    - { name: "w", field: "DIOw", given: "DIOwGiven", default: "0.0" }
    - { name: "l", field: "DIOl", given: "DIOlGiven", default: "0.0" }
    - { name: "m", field: "DIOm", given: "DIOmGiven", default: "1.0" }
