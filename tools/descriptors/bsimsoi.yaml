    - { name: "L",   field: "B4SOIl",                given: "B4SOIlGiven",                default: "1e-7",  always_given: true }
    - { name: "M",   field: "B4SOIm",                given: "B4SOImGiven",                default: "1.0",   always_given: true }
    - { name: "AD",  field: "B4SOIdrainArea",         given: "B4SOIdrainAreaGiven",         default: "0.0" }
    - { name: "AS",  field: "B4SOIsourceArea",        given: "B4SOIsourceAreaGiven",        default: "0.0" }
    - { name: "PD",  field: "B4SOIdrainPerimeter",    given: "B4SOIdrainPerimeterGiven",    default: "0.0" }
    - { name: "PS",  field: "B4SOIsourcePerimeter",   given: "B4SOIsourcePerimeterGiven",   default: "0.0" }
    - { name: "NRD", field: "B4SOIdrainSquares",      given: "B4SOIdrainSquaresGiven",      default: "0.0" }
    - { name: "NRS", field: "B4SOIsourceSquares",     given: "B4SOIsourceSquaresGiven",     default: "0.0" }
    - { name: "SA",  field: "B4SOIsa",                given: "B4SOIsaGiven",                default: "0.0" }
    - { name: "SB",  field: "B4SOIsb",                given: "B4SOIsbGiven",                default: "0.0" }
    - { name: "SD",  field: "B4SOIsd",                given: "B4SOIsdGiven",                default: "0.0" }
    - { name: "NF",  field: "B4SOInf",                given: "B4SOInfGiven",                default: "1.0",   always_given: true }
  model_types:
    - { spice_name: "nmos", flag_field: "B4SOItype", flag_value: 1 }
    - { spice_name: "pmos", flag_field: "B4SOItype", flag_value: -1 }
